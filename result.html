<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Result</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 320px; /* Card ki width fix kar di */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h2 {
            color: #333;
            font-size: 20px;
        }
        .qr-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            width: 180px; /* QR Code ka size ekdum perfect fit kiya */
            height: 180px;
            display: block;
        }
        button {
            background-color: #667eea;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #5a6fd6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Your QR Code</h2>
        <div class="qr-box">
            <img id="result-image" src="" alt="QR Code">
        </div>
        <button onclick="window.location.href='index.html'">
    Go Back
</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
    const qrData = localStorage.getItem("qrData");
    const resultImage = document.getElementById("result-image");

    if (!qrData) {
        alert("No QR data found!");
        window.location.href = "index.html";
        return;
    }

    resultImage.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" +
        encodeURIComponent(qrData);
});

    </script>
</body>
</html>
